{% extends "base.html" %}

{% block title %}Вход в систему{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-box">
        <h2><i class="fas fa-sign-in-alt"></i> Вход в систему</h2>

        <form method="POST" action="{{ url_for('login') }}" class="auth-form">
            <div class="form-group">
                <label for="username">
                    <i class="fas fa-user"></i> Имя пользователя
                </label>
                <input type="text"
                       id="username"
                       name="username"
                       required
                       placeholder="Введите имя пользователя">
            </div>

            <div class="form-group">
                <label for="password">
                    <i class="fas fa-lock"></i> Пароль
                </label>
                <input type="password"
                       id="password"
                       name="password"
                       required
                       placeholder="Введите пароль">
            </div>

            <button type="submit" class="btn btn-primary btn-block">
                <i class="fas fa-sign-in-alt"></i> Войти
            </button>
        </form>

        <div class="auth-footer">
            <p>Демо-доступы:</p>
            <ul>
                <li><strong>admin</strong> / <strong>Admin123</strong> (администратор)</li>
                <li><strong>user1</strong> / <strong>User12345</strong> (пользователь)</li>
            </ul>
        </div>
    </div>
</div>
{% endblock %}
